<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レシピ集</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', sans-serif;
      background: #faf7f2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 20px;
      color: #3a3a3a;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 360px;
      margin-bottom: 20px;
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: transform 0.15s;
    }
    .card:active { transform: scale(0.97); }
    .card-inner {
      padding: 24px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .icon {
      font-size: 36px;
      flex-shrink: 0;
    }
    .card-text h2 {
      font-size: 16px;
      color: #2a2a2a;
      margin-bottom: 4px;
      font-weight: bold;
    }
    .card-text p {
      font-size: 16px;
      color: #888;
      font-weight: bold;
    }
    .card-footer {
      background: #f5f0e8;
      padding: 10px 20px;
      font-size: 15px;
      color: #a0856a;
      text-align: right;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>📖 レシピ集</h1>

  <a class="card" href="https://bbeiljtbmklkvyombdal.supabase.co/storage/v1/object/public/recipes/hotsand_recipes50v2_cmp.pdf" target="_blank">
    <div class="card-inner">
      <div class="icon">🥪</div>
      <div class="card-text">
        <h2>ホットサンドレシピ集</h2>
        <p>50レシピ収録</p>
      </div>
    </div>
    <div class="card-footer">タップして開く →</div>
  </a>

  <a class="card" href="https://bbeiljtbmklkvyombdal.supabase.co/storage/v1/object/public/recipes/mg-recipes12_2025_v1-2.pdf" target="_blank">
    <div class="card-inner">
      <div class="icon">🍳</div>
      <div class="card-text">
        <h2>マルチグリドルレシピ集</h2>
        <p>12レシピ収録</p>
      </div>
    </div>
    <div class="card-footer">タップして開く →</div>
  </a>
</body>
</html>
